name: Selenium BDD Automation CI

on:
  push:
    branches: [ main, develop, release/* ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Nightly regression at 1 AM IST (7:30 PM UTC)
    - cron: ''
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser'
        required: true
        default: 'chrome'
        type: choice
        options: [ chrome, firefox, edge ]
      environment:
        description: 'Environment'
        required: true
        default: 'qa'
        type: choice
        options: [ qa, staging ]
      tags:
        description: 'Cucumber tags (e.g. @smoke, @regression)'
        required: true
        default: '@smoke'
      headless:
        description: 'Run headless'
        required: false
        default: 'true'
        type: boolean

env:
  JAVA_VERSION:   '17'
  MAVEN_VERSION:  '3.9.6'
  ALLURE_VERSION: '2.25.0'

jobs:

  # ── Lint / Compile ─────────────────────────────────────────────────────
  build:
    name: Compile & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile
        run: mvn validate compile -q

  # ── Test Execution ─────────────────────────────────────────────────────
  test:
    name: Run Tests — ${{ github.event.inputs.browser || 'chrome' }} / ${{ github.event.inputs.environment || 'qa' }}
    runs-on: ubuntu-latest
    needs: build

    strategy:
      fail-fast: false
      matrix:
        browser: [ chrome ]   # extend: [ chrome, firefox ] for cross-browser

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run Tests
        run: |
          mvn test \
            -Dbrowser=${{ github.event.inputs.browser || 'chrome' }} \
            -Denv=${{ github.event.inputs.environment || 'qa' }} \
            -Dtags="${{ github.event.inputs.tags || '@smoke' }}" \
            -Dheadless=${{ github.event.inputs.headless || 'true' }} \
            -Dremote=false \
            -Dmaven.test.failure.ignore=true \
            -q
        env:
          CI: true

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: target/allure-results
          retention-days: 7

      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots-${{ matrix.browser }}
          path: target/screenshots
          retention-days: 3

      - name: Upload Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.browser }}
          path: target/logs
          retention-days: 3

      - name: Publish Test Results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: TestNG Results — ${{ matrix.browser }}
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false

  # ── Allure Report ──────────────────────────────────────────────────────
  report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results-combined
          merge-multiple: true

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results-combined
          allure_report:  allure-report
          allure_history: allure-history
          keep_reports:   20

      - name: Deploy Report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
