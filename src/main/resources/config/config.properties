# ──────────────────────────────────────────────────────────────────────────────
# Framework Configuration — Default (QA Environment)
# Override via: -Dproperty=value (system property) or env-specific files
# ──────────────────────────────────────────────────────────────────────────────

# ── Browser ──────────────────────────────────────────────────────────────────
browser=chrome
headless=false
browser.version=latest

# ── Environment ──────────────────────────────────────────────────────────────
env=qa
base.url=https://www.saucedemo.com
api.base.url=https://api.saucedemo.com

# ── Timeouts (seconds) ───────────────────────────────────────────────────────
implicit.wait=0
explicit.wait=20
page.load.timeout=30
polling.interval=500

# ── Remote / Grid ─────────────────────────────────────────────────────────────
remote=false
grid.url=http://localhost:4444/wd/hub

# ── Retry ────────────────────────────────────────────────────────────────────
retry.count=1

# ── Screenshot ───────────────────────────────────────────────────────────────
screenshot.on.failure=true
screenshot.dir=target/screenshots

# ── Reporting ────────────────────────────────────────────────────────────────
allure.results.dir=target/allure-results

# ── Email ────────────────────────────────────────────────────────────────────
email.enabled=false
email.recipients=qa-team@company.com
